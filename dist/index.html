<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형규 - gemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121314; background: radial-gradient(circle at center, #1f2124 0%, #0f1011 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .centered-card { width: 100%; max-width: 410px; height: calc(100vh - 30px); max-height: 820px; background-color: #1a1c1e; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .card-image-wrapper { width: 100%; height: 360px; position: relative; overflow: hidden; background-color: #111; flex-shrink: 0; }
        .card-content-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, #1a1c1e 0%, #141517 100%); }
        .floating-chat-widget { position: absolute; bottom: 20px; right: 20px; z-index: 100; }
        .chat-toggle-btn { width: 50px; height: 50px; background-color: #ffffff; color: #0c0d0e; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #3b82f6; position: relative; }
        .chat-window { width: 310px; height: 400px; background: #191b1d; border: 2px solid #3b82f6; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; }
        .widget-msg-zone { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .smart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased font-sans text-stone-200">
    <div class="centered-card">
        <div id="mainPage" class="w-full h-full flex flex-col justify-between">
            <div class="card-image-wrapper">
                <img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a13_1779240635.jpg" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#1a1c1e] via-transparent to-transparent opacity-90"></div>
            </div>
            <div class="card-content-wrapper">
                <div class="text-center pt-1">
                    <h1 class="text-2xl font-bold text-white mb-1">형규</h1>
                    <p class="text-[10px] text-stone-400 font-semibold uppercase tracking-widest mb-2.5">gemi</p>
                    <p class="text-xs text-stone-300 leading-relaxed max-w-[88%] mx-auto"></p>
                </div>
                <div class="space-y-2.5 w-full pb-1">
                    <div class="grid grid-cols-2 gap-2">
                        <a href="#" target="_blank" style="display: none !important;" class="bg-stone-800 text-stone-200 text-center font-medium text-xs py-2.5 rounded-xl border border-stone-700/50">Instagram</a>
                        <a href="#" target="_blank" style="display: none !important;" class="bg-stone-800 text-stone-200 text-center font-medium text-xs py-2.5 rounded-xl border border-stone-700/50">Naver Blog</a>
                    </div>
                    <div class="smart-grid">
                        <button onclick="switchPage('promoPage')" class="bg-stone-800 text-stone-200 font-bold text-[11px] py-3 rounded-xl border border-stone-700/50">PORTFOLIO</button>
                        <button onclick="switchPage('contactPage')" class="bg-white text-stone-950 font-bold text-[11px] py-3 rounded-xl">GET IN TOUCH</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="promoPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-sm font-bold text-white">PORTFOLIO</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400">← BACK</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5">
                <div class="grid grid-cols-2 gap-3"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a11_1779240634.jpg" class="rounded-xl"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a12_1779240635.jpg" class="rounded-xl"></div>
            </div>
        </div>

        <div id="contactPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-sm font-bold text-white">GET IN TOUCH</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400">← BACK</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-4 text-xs">
                <input type="text" id="formClientName" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="이름">
                <input type="text" id="formClientPhone" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="연락처">
                <textarea id="formProjectDesc" rows="4" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="문의 내용"></textarea>
                <button onclick="submitEstimate()" id="submitBtn" class="w-full bg-white text-stone-950 font-bold py-3.5 rounded-xl">SUBMIT</button>
            </div>
        </div>

        <div class="floating-chat-widget">
            <button id="chatToggleBtn" class="chat-toggle-btn">💬</button>
            <div id="chatWindow" class="chat-window hidden absolute bottom-16 right-0">
                <div id="widgetMsgZone" class="widget-msg-zone"><div class="bg-stone-800 text-stone-200 text-xs p-3 rounded-xl">안녕하세요!</div></div>
                <div class="p-3 bg-stone-900 flex gap-2">
                    <input type="text" id="widgetInput" class="flex-1 bg-stone-800 text-white text-xs px-2 rounded">
                    <button onclick="sendAiMessage()" class="bg-blue-600 text-white text-xs px-3 rounded">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const encodedData = "error";
        const G_TXT = (encodedData === "error") ? "지침 없음" : atob(encodedData);
        const API_KEY = "OPENROUTER_API_KEY_HERE";

        function switchPage(p) {
            ['mainPage', 'promoPage', 'contactPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(p).classList.remove('hidden');
        }

        async function submitEstimate() {
            const btn = document.getElementById('submitBtn');
            const data = {
                name: document.getElementById('formClientName').value,
                phone: document.getElementById('formClientPhone').value,
                message: document.getElementById('formProjectDesc').value
            };
            btn.innerText = "SENDING...";
            
            // 슈파베이스 저장
            await fetch("https://bjbpjkeahkupmeuvfwys.supabase.co/rest/v1/gemi_customer_inquiry", {
                method: "POST",
                headers: { "apikey": "sb_publishable_yHPGOhKSEPAehg-sin-7IQ_nHtfYBWU", "Authorization": "Bearer sb_publishable_yHPGOhKSEPAehg-sin-7IQ_nHtfYBWU", "Content-Type": "application/json" },
                body: JSON.stringify({ customer_name: data.name, customer_contact: data.phone, message: data.message })
            });

            // 텔레그램 알림
            await fetch("https://api.telegram.org/bot8634715913:AAFViFIFDLaj-WsSvvuGUXmK1KMvjWOjNyE/sendMessage", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: "859745575", text: `신규 의뢰: ${data.name}\n${data.phone}\n${data.message}` })
            });

            alert("접수되었습니다!");
            btn.innerText = "SUBMIT";
        }

        // sendAiMessage 등 나머지 기존 함수들은 동일하게 유지...
    </script>
</body>
</html>

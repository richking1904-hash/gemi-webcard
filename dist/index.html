<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장명석 - 장명석</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121314; background: radial-gradient(circle at center, #1f2124 0%, #0f1011 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .centered-card { width: 100%; max-width: 420px; height: calc(100vh - 40px); max-height: 840px; background-color: #1a1c1e; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .card-image-wrapper { width: 100%; height: 380px; position: relative; overflow: hidden; background-color: #111; flex-shrink: 0; }
        .card-content-wrapper { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, #1a1c1e 0%, #141517 100%); }
        .floating-chat-widget { position: absolute; bottom: 20px; right: 20px; z-index: 100; }
        .chat-toggle-btn { width: 52px; height: 52px; background-color: #ffffff; color: #0c0d0e; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #3b82f6; position: relative; }
        .chat-window { width: 320px; height: 420px; background: #191b1d; border: 2px solid #3b82f6; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; }
        .widget-msg-zone { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .widget-msg-zone::-webkit-scrollbar { width: 4px; }
        .widget-msg-zone::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .sub-page-content::-webkit-scrollbar { width: 4px; }
        .sub-page-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body class="antialiased font-sans text-stone-200">

    <div class="centered-card">
        <div id="mainPage" class="w-full h-full flex flex-col justify-between">
            <div class="card-image-wrapper">
                <img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T223201.309_1779171963.png" alt="Profile Image" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#1a1c1e] via-transparent to-transparent opacity-90"></div>
            </div>
            <div class="card-content-wrapper">
                <div class="text-center pt-4">
                    <h1 class="text-3xl font-bold tracking-tight text-white mb-1.5">장명석</h1>
                    <p class="text-xs text-stone-400 font-semibold tracking-widest uppercase mb-4">장명석</p>
                    <p class="text-xs text-stone-300 leading-relaxed max-w-[85%] mx-auto">장명석, 고요한 아름다움을 담다.</p>
                </div>
                <div class="space-y-3 w-full pb-4">
                    <div class="grid grid-cols-2 gap-2">
                        <a href="" target="_blank" style="display: none !important;" class="bg-stone-800/90 hover:bg-stone-700 text-stone-200 text-center font-medium text-xs py-3 rounded-xl border border-stone-700/50 transition-all">Instagram</a>
                        <a href="" target="_blank" style="display: none !important;" class="bg-stone-800/90 hover:bg-stone-700 text-stone-200 text-center font-medium text-xs py-3 rounded-xl border border-stone-700/50 transition-all">Naver Blog</a>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="switchPage('promoPage')" class="block w-full bg-stone-800 hover:bg-stone-700 text-stone-200 text-center font-bold text-xs py-3.5 rounded-xl border border-stone-700/50 shadow-lg transition-all tracking-wider uppercase">PORTFOLIO VIEW</button>
                        <button onclick="switchPage('contactPage')" class="block w-full bg-white hover:bg-stone-200 text-stone-950 text-center font-bold text-xs py-3.5 rounded-xl shadow-lg transition-all tracking-wider uppercase">GET IN TOUCH</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="promoPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center bg-[#1a1c1e] flex-shrink-0">
                <span class="text-sm font-bold tracking-wider text-white">PORTFOLIO</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400 hover:text-white transition-all">← BACK</button>
            </div>
            <div class="sub-page-content flex-1 overflow-y-auto p-5">
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <div class="space-y-3"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a11_1779171964.jpg" class="rounded-xl shadow-md"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a13_1779171965.jpg" class="rounded-xl shadow-md"></div>
                    <div class="space-y-3 pt-6"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a12_1779171965.jpg" class="rounded-xl shadow-md"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/a14_1779171965.jpg" class="rounded-xl shadow-md"></div>
                </div>
            </div>
        </div>

        <div id="contactPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center bg-[#1a1c1e] flex-shrink-0">
                <span class="text-sm font-bold tracking-wider text-white">GET IN TOUCH</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400 hover:text-white transition-all">← BACK</button>
            </div>
            <div class="sub-page-content flex-1 overflow-y-auto p-5 space-y-5 text-xs">
                <h2 class="text-lg font-bold text-white tracking-tight">프로젝트 의뢰 및 협업 문의</h2>
                <div class="space-y-4">
                    <div class="space-y-1.5"><label class="block text-stone-400">성함 / 기업명</label><input type="text" id="formClientName" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="홍길동"></div>
                    <div class="space-y-1.5"><label class="block text-stone-400">연락처</label><input type="text" id="formClientPhone" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="010-0000-0000"></div>
                    <div class="space-y-1.5"><label class="block text-stone-400">프로젝트 유형</label>
                        <select id="formProjectType" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-stone-300">
                            <option value="브랜딩 및 로고 디자인">브랜딩 및 로고 디자인</option>
                            <option value="패키지 / 상세페이지">패키지 / 상세페이지 제품 디자인</option>
                            <option value="웹 / 모바일 웹명함 구축">웹 / 모바일 웹명함 구축</option>
                        </select>
                    </div>
                    <div class="space-y-1.5"><label class="block text-stone-400">문의 및 요청사항 상세</label><textarea id="formProjectDesc" rows="4" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="의뢰하실 내용을 상세히 적어주세요."></textarea></div>
                    <button onclick="submitEstimate()" id="submitBtn" class="w-full bg-white text-stone-950 font-bold py-3.5 rounded-xl shadow-lg uppercase hover:bg-stone-200 transition-all">SUBMIT REQUEST</button>
                </div>
            </div>
        </div>

        <div class="floating-chat-widget">
            <button id="chatToggleBtn" class="chat-toggle-btn focus:outline-none">💬</button>
            <div id="chatWindow" class="chat-window hidden absolute bottom-16 right-0 flex-col">
                <div class="bg-blue-900/60 px-4 py-3 border-b border-white/10 flex justify-between items-center text-white text-xs">
                    <span>✨ AI Assistant</span>
                    <button onclick="switchPage('contactPage')" class="bg-white/20 px-2 py-1 rounded-md text-[10px]">의뢰하기</button>
                </div>
                <div id="widgetMsgZone" class="widget-msg-zone">
                    <div class="bg-stone-800 text-stone-200 text-xs p-3.5 rounded-xl">안녕하세요! 무엇을 도와드릴까요? 👇</div>
                    <div id="faqBtnArea" class="flex flex-col gap-2">
                        <button onclick="handleFaq(1)" class="w-full text-left bg-white/5 text-stone-200 text-xs p-2.5 rounded-xl border border-white/10"></button>
                        <button onclick="handleFaq(2)" class="w-full text-left bg-white/5 text-stone-200 text-xs p-2.5 rounded-xl border border-white/10"></button>
                        <button onclick="handleFaq(3)" class="w-full text-left bg-white/5 text-stone-200 text-xs p-2.5 rounded-xl border border-white/10"></button>
                    </div>
                </div>
                <div class="p-3 bg-stone-900/90 flex gap-2">
                    <input type="text" id="widgetInput" placeholder="질문 입력..." class="flex-1 bg-stone-800 text-xs text-white rounded-xl px-3 outline-none">
                    <button id="widgetSendBtn" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-xl">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚙️ 슈파베이스와 직접 거래를 트기 위한 다이렉트 자산 키 바인딩
        const S_URL = "https://bjbpjkeahkupmeuvfwys.supabase.co";
        const S_KEY = "sb_publishable_yHPGOhKSEPAehg-sin-7IQ_nHtfYBWU";

        function switchPage(pageId) {
            ['mainPage', 'promoPage', 'contactPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            document.getElementById('chatWindow').classList.add('hidden');
        }

        document.getElementById('chatToggleBtn').addEventListener('click', () => document.getElementById('chatWindow').classList.toggle('hidden'));

        function handleFaq(num) {
            const faqs = { 1: ["", ""], 2: ["", ""], 3: ["", ""] };
            appendMessage('user', faqs[num][0]);
            setTimeout(() => appendMessage('bot', faqs[num][1] + "<br><br><button onclick='switchPage(\"contactPage\")' style='background-color:#2563eb; color:white; font-weight:bold; font-size:12px; padding:10px 16px; border-radius:12px; width:100%; display:block; text-align:center;'>🚀 정식 프로젝트 의뢰하러 가기</button>"), 300);
        }

        function appendMessage(sender, message) {
            const zone = document.getElementById('widgetMsgZone');
            const msgHtml = `<div class="flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'} w-full mb-2">
                <div class="${sender === 'user' ? 'bg-blue-600' : 'bg-stone-800'} text-white text-xs px-3.5 py-2 rounded-xl max-w-[85%] shadow-md">${message}</div>
            </div>`;
            zone.insertAdjacentHTML('beforeend', msgHtml);
            zone.scrollTop = zone.scrollHeight;
        }

        async function sendAiMessage() {
            const input = document.getElementById('widgetInput');
            const text = input.value.trim();
            if(!text) return;
            appendMessage('user', text);
            input.value = '';
            appendMessage('bot', "생각 중... 잠시만 기다려 주세요.");
        }

        document.getElementById('widgetSendBtn').addEventListener('click', sendAiMessage);
        document.getElementById('widgetInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAiMessage(); });

        // 🎯 [정석 파이프라인 연동 복구 부품] 의뢰서 완료 버튼을 누르면 가동하는 무전기
        async function submitEstimate() {
            const name = document.getElementById('formClientName').value.trim();
            const phone = document.getElementById('formClientPhone').value.trim();
            const type = document.getElementById('formProjectType').value;
            const desc = document.getElementById('formProjectDesc').value.trim();
            const btn = document.getElementById('submitBtn');

            if(!name || !phone || !desc) { alert("모든 항목을 입력해주세요."); return; }

            // 중복 클릭 방지 락 잠금
            btn.disabled = true;
            btn.innerText = "SENDING...";

            // 📂 데이터 가공 주머니 포장
            const dbPayload = {
                brand_name: "장명석",
                customer_name: name,
                customer_contact: phone,
                inquiry_type: type,
                message: desc
            };
            
            try {
                // 📡 [정석 납땜] 겉돌지 말고 슈파베이스의 진짜 마스터 장부방으로 즉시 전송 격발!
                const res = await fetch(`${S_URL}/rest/v1/gemi_customer_inquiry`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${S_KEY}`,
                        "apiKey": S_KEY,
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(dbPayload)
                });

                if(res.ok) {
                    alert("✨ 의뢰서가 성공적으로 접수되었습니다! 디렉터 장형규가 신속히 연락드리겠습니다.");
                    // 입력 폼 청소
                    document.getElementById('formClientName').value = '';
                    document.getElementById('formClientPhone').value = '';
                    document.getElementById('formProjectDesc').value = '';
                    switchPage('mainPage');
                    
                    // 💡 안내: 슈파베이스 장부에 성공적으로 들어가면, 
                    // 파이썬 백엔드(에지 펑션/서버 트리거)단에서 연동해둔 형규님 텔레그램으로 자동 알림 진동이 타격됩니다!
                } else {
                    const errText = await res.text();
                    console.error("Supabase Error:", errText);
                    alert("서버 통신 장부 저장 중 오류가 발생했습니다. 다시 시도해 주세요.");
                }
            } catch (e) { 
                console.error("Network Error:", e);
                alert("네트워크 연결에 실패했습니다.");
            } finally {
                // 버튼 락 해제
                btn.disabled = false;
                btn.innerText = "SUBMIT REQUEST";
            }
        }
    </script>
</body>
</html>

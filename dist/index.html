<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원 - ge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --dark-bg: #121314; }
        body { background-color: var(--dark-bg); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .serif { font-family: 'Bodoni Moda', serif; }
        .centered-card { width: 100%; max-width: 410px; height: calc(100vh - 30px); max-height: 820px; background-color: #1a1c1e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        /* 👑 이미지 영역 60%로 확대 */
        .card-image-wrapper { width: 100%; height: 60%; position: relative; overflow: hidden; flex-shrink: 0; }
        .card-content-wrapper { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: center; background: #1a1c1e; }
        .sub-page-content { flex: 1; overflow-y: auto; padding: 24px; background: #0c0d0e; }
        .sub-page-content::-webkit-scrollbar { width: 3px; }
        .sub-page-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        .smart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; width: 100%; }
        .floating-chat-widget { position: absolute; bottom: 24px; right: 24px; z-index: 100; }
        .chat-toggle-btn { width: 56px; height: 56px; background-color: #ffffff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid var(--gold); cursor: pointer; transition: 0.3s; }
        .chat-window { width: 320px; height: 450px; background: #191b1d; border: 1px solid var(--gold); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; }
        .widget-msg-zone { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .hidden { display: none !important; }
        input, textarea { background: #1a1c1e !important; border: 1px solid #333 !important; color: white !important; border-radius: 12px !important; padding: 12px !important; width: 100%; outline: none; }
        input:focus, textarea:focus { border-color: var(--gold) !important; }
        .gold-btn { background: var(--gold); color: #000; font-weight: 700; border-radius: 14px; padding: 14px; width: 100%; transition: 0.3s; }
    </style>
</head>
<body class="antialiased font-sans text-stone-200">
    <div class="centered-card">
        <div id="mainPage" class="w-full h-full flex flex-col">
            <div class="card-image-wrapper">
                <img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T222118.658_1779242799.png" class="w-full h-full object-cover grayscale-[20%]">
                <div class="absolute inset-0 bg-gradient-to-t from-[#1a1c1e] via-transparent to-transparent opacity-20"></div>
            </div>
            <div class="card-content-wrapper">
                <div class="text-center">
                    <h1 class="text-3xl font-bold tracking-tight text-white mb-1 serif italic">원</h1>
                    <p class="text-[10px] text-[#C5A059] font-bold uppercase tracking-[4px] mb-4">ge</p>
                    <div class="w-8 h-[1px] bg-[#C5A059] mx-auto mb-4"></div>
                    <p class="text-xs text-stone-300 leading-relaxed max-w-[90%] mx-auto font-light">asf</p>
                </div>
                
                <div class="text-center text-[11px] text-stone-400 space-y-1 my-6">
                    <div>📞 233243</div>
                    <div>✉️ safasf</div>
                </div>

                <div class="grid grid-cols-2 gap-3" style="display: flex;">
                    <a href="asfdsaf" target="_blank" class="bg-[#C5A059] text-black text-center font-bold text-[10px] py-3 rounded uppercase">Instagram</a>
                    <a href="asdfs" target="_blank" style="display: flex;" class="bg-[#C5A059] text-black text-center font-bold text-[10px] py-3 rounded uppercase">Naver Blog</a>
                </div>

                <div class="smart-grid mt-4">
                    <button onclick="switchPage('promoPage')" class="bg-stone-800 text-stone-200 font-bold text-[11px] py-4 rounded-2xl border border-white/5 tracking-widest uppercase">Portfolio</button>
                    <button onclick="switchPage('contactPage')" class="gold-btn text-[11px] py-4 tracking-widest uppercase shadow-xl">Contact</button>
                </div>
            </div>
        </div>

        <div id="promoPage" class="hidden w-full h-full flex flex-col">
            <div class="px-6 py-5 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-xs font-bold tracking-[3px] text-[#C5A059] serif uppercase">Selected Pieces</span>
                <button onclick="switchPage('mainPage')" class="text-[10px] text-stone-500 hover:text-white uppercase tracking-wider">Close</button>
            </div>
            <div class="sub-page-content">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-4"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T221941.990_1779242797.png" class="rounded-2xl border border-white/5 shadow-2xl"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T222014.865_1779242798.png" class="rounded-2xl border border-white/5 shadow-2xl"></div>
                    <div class="space-y-4 pt-8"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T222001.297_1779242798.png" class="rounded-2xl border border-white/5 shadow-2xl"><img src="https://bjbpjkeahkupmeuvfwys.supabase.co/storage/v1/object/public/gemi_assets/Image_fx - 2026-01-15T222040.747_1779242798.png" class="rounded-2xl border border-white/5 shadow-2xl"></div>
                </div>
            </div>
        </div>

        <div id="contactPage" class="hidden w-full h-full flex flex-col">
            <div class="px-6 py-5 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-xs font-bold tracking-[3px] text-[#C5A059] serif uppercase">Consultation</span>
                <button onclick="switchPage('mainPage')" class="text-[10px] text-stone-500 hover:text-white uppercase tracking-wider">Close</button>
            </div>
            <div class="sub-page-content space-y-5">
                <div class="space-y-4 pt-2">
                    <div class="space-y-1.5"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Name / Brand</label><input type="text" id="formClientName" placeholder="성함 또는 기업명을 입력하세요"></div>
                    <div class="space-y-1.5"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Contact</label><input type="text" id="formClientPhone" placeholder="010-0000-0000"></div>
                    <div class="space-y-1.5"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Project Type</label><input type="text" id="formProjectType" placeholder="예: 브랜딩, 상세페이지 제작"></div>
                    <div class="space-y-1.5"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Budget Range</label><input type="text" id="formBudget" placeholder="예: 300만원"></div>
                    <div class="space-y-1.5"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Details</label><textarea id="formProjectDesc" rows="3" placeholder="프로젝트 목표 및 요청사항을 기술해주세요."></textarea></div>
                    <button onclick="submitEstimate()" id="submitBtn" class="gold-btn mt-4">SUBMIT BRIEF</button>
                </div>
            </div>
        </div>

        <div class="floating-chat-widget">
            <button id="chatToggleBtn" class="chat-toggle-btn text-xl shadow-2xl">💬</button>
            <div id="chatWindow" class="chat-window hidden absolute bottom-16 right-0">
                <div class="bg-[#C5A059] px-4 py-3 text-black font-bold text-[10px] tracking-widest uppercase">✨ GeMi AI Assistant</div>
                <div id="widgetMsgZone" class="widget-msg-zone bg-[#1a1c1e]"></div>
                <div class="p-4 bg-[#0c0d0e] flex gap-2 border-t border-white/5">
                    <input type="text" id="widgetInput" class="flex-1 text-[11px]" placeholder="Ask anything...">
                    <button onclick="sendAiMessage()" class="bg-[#C5A059] text-black text-[11px] font-bold px-4 rounded-xl">전송</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const encodedData = "error";
        let G_TXT = (encodedData === "error") ? "" : atob(encodedData);
        function switchPage(id) { ['mainPage', 'promoPage', 'contactPage'].forEach(el => document.getElementById(el).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        document.getElementById('chatToggleBtn').addEventListener('click', () => document.getElementById('chatWindow').classList.toggle('hidden'));
        async function submitEstimate() {
            const btn = document.getElementById('submitBtn');
            const data = { name: document.getElementById('formClientName').value, phone: document.getElementById('formClientPhone').value, type: document.getElementById('formProjectType').value, budget: document.getElementById('formBudget').value, desc: document.getElementById('formProjectDesc').value };
            btn.innerText = "SENDING...";
            await fetch("https://bjbpjkeahkupmeuvfwys.supabase.co/rest/v1/gemi_customer_inquiry", { method: "POST", headers: { "apikey": "sb_publishable_yHPGOhKSEPAehg-sin-7IQ_nHtfYBWU", "Authorization": "Bearer sb_publishable_yHPGOhKSEPAehg-sin-7IQ_nHtfYBWU", "Content-Type": "application/json" }, body: JSON.stringify({ customer_name: data.name, customer_contact: data.phone, inquiry_type: data.type, message: `[예산: ${data.budget}] ${data.desc}` }) });
            await fetch("https://api.telegram.org/bot8634715913:AAFViFIFDLaj-WsSvvuGUXmK1KMvjWOjNyE/sendMessage", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: "859745575", text: `신규 의뢰: ${data.name}\n${data.phone}\n타입: ${data.type}\n예산: ${data.budget}\n내용: ${data.desc}`, parse_mode: "Markdown" }) });
            alert("전송되었습니다!"); btn.innerText = "SUBMIT BRIEF"; switchPage('mainPage');
        }
        async function sendAiMessage() {
            const input = document.getElementById('widgetInput'); const text = input.value.trim(); if(!text) return;
            document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="flex flex-col items-end mb-2"><div class="bg-[#C5A059] p-3 rounded-2xl text-[11px] text-black">${text}</div></div>`); input.value = '';
        }
    </script>
</body>
</html>

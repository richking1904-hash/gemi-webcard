<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${user_name} - ${brand_name}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121314; background: radial-gradient(circle at center, #1f2124 0%, #0f1011 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .centered-card { width: 100%; max-width: 410px; height: calc(100vh - 30px); max-height: 820px; background-color: #1a1c1e; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .card-image-wrapper { width: 100%; height: 360px; position: relative; overflow: hidden; background-color: #111; flex-shrink: 0; }
        .card-content-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, #1a1c1e 0%, #141517 100%); }
        .floating-chat-widget { position: absolute; bottom: 20px; right: 20px; z-index: 100; }
        .chat-toggle-btn { width: 50px; height: 50px; background-color: #ffffff; color: #0c0d0e; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #3b82f6; position: relative; }
        .chat-window { width: 310px; height: 400px; background: #191b1d; border: 2px solid #3b82f6; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; }
        .widget-msg-zone { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .smart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased font-sans text-stone-200">
    <div class="centered-card">
        <div id="mainPage" class="w-full h-full flex flex-col justify-between">
            <div class="card-image-wrapper">
                <img src="${main_image_url}" alt="Profile Image" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#1a1c1e] via-transparent to-transparent opacity-90"></div>
            </div>
            <div class="card-content-wrapper">
                <div class="text-center pt-1">
                    <h1 class="text-2xl font-bold tracking-tight text-white mb-1">${user_name}</h1>
                    <p class="text-[10px] text-stone-400 font-semibold tracking-widest uppercase mb-2.5">${brand_name}</p>
                    <p class="text-xs text-stone-300 leading-relaxed max-w-[88%] mx-auto">${INTRODUCTION}</p>
                </div>
                <div class="w-full flex items-center justify-between px-2 py-2 my-1 border-y border-white/5 bg-white/[0.005]">
                    <a href="tel:${PHONE}" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-stone-800 border border-white/10 hover:bg-blue-600 hover:border-blue-500 transition-all group">
                        <span class="text-[11px]">📞</span>
                        <span class="text-[9px] tracking-wider font-bold text-stone-300 group-hover:text-white transition-all uppercase">CALL</span>
                    </a>
                    <div class="flex items-center gap-1.5 text-stone-400 cursor-default select-all">
                        <span class="text-[11px] opacity-60">✉️</span>
                        <span class="text-[10px] font-medium tracking-wide font-mono">${EMAIL}</span>
                    </div>
                </div>
                <div class="space-y-2.5 w-full pb-1">
                    <div class="grid grid-cols-2 gap-2">
                        <a href="${SNS1_URL}" target="_blank" style="${SNS1_DISPLAY}" class="bg-stone-800/90 hover:bg-stone-700 text-stone-200 text-center font-medium text-xs py-2.5 rounded-xl border border-stone-700/50 transition-all">${SNS1_TYPE}</a>
                        <a href="${SNS2_URL}" target="_blank" style="${SNS2_DISPLAY}" class="bg-stone-800/90 hover:bg-stone-700 text-stone-200 text-center font-medium text-xs py-2.5 rounded-xl border border-stone-700/50 transition-all">${SNS2_TYPE}</a>
                    </div>
                    <div class="smart-grid">
                        <button onclick="switchPage('promoPage')" class="bg-stone-800 hover:bg-stone-700 text-stone-200 text-center font-bold text-[11px] py-3 rounded-xl border border-stone-700/50 shadow-lg transition-all tracking-wider uppercase">PORTFOLIO VIEW</button>
                        <button onclick="switchPage('contactPage')" class="bg-white hover:bg-stone-200 text-stone-950 text-center font-bold text-[11px] py-3 rounded-xl shadow-lg transition-all tracking-wider uppercase">GET IN TOUCH</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="promoPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center bg-[#1a1c1e] flex-shrink-0">
                <span class="text-sm font-bold tracking-wider text-white">PORTFOLIO</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400 hover:text-white transition-all">← BACK</button>
            </div>
            <div class="sub-page-content flex-1 overflow-y-auto p-5">
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <div class="space-y-3"><img src="${SUB_IMAGE_URL_1}" class="rounded-xl shadow-md"><img src="${SUB_IMAGE_URL_3}" class="rounded-xl shadow-md"></div>
                    <div class="space-y-3 pt-6"><img src="${SUB_IMAGE_URL_2}" class="rounded-xl shadow-md"><img src="${SUB_IMAGE_URL_4}" class="rounded-xl shadow-md"></div>
                </div>
            </div>
        </div>
        <div id="contactPage" class="hidden w-full h-full flex flex-col bg-[#141517]">
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center bg-[#1a1c1e] flex-shrink-0">
                <span class="text-sm font-bold tracking-wider text-white">GET IN TOUCH</span>
                <button onclick="switchPage('mainPage')" class="text-xs text-stone-400 hover:text-white transition-all">← BACK</button>
            </div>
            <div class="sub-page-content flex-1 overflow-y-auto p-5 space-y-5 text-xs">
                <h2 class="text-lg font-bold text-white tracking-tight">프로젝트 의뢰 및 협업 문의</h2>
                <div class="space-y-4">
                    <div class="space-y-1.5"><label class="block text-stone-400">성함 / 기업명</label><input type="text" id="formClientName" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="홍길동"></div>
                    <div class="space-y-1.5"><label class="block text-stone-400">연락처</label><input type="text" id="formClientPhone" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="010-0000-0000"></div>
                    <div class="space-y-1.5"><label class="block text-stone-400">문의 상세내용</label><textarea id="formProjectDesc" rows="4" class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-white" placeholder="의뢰 내용을 적어주세요."></textarea></div>
                    <button onclick="submitEstimate()" id="submitBtn" class="w-full bg-white text-stone-950 font-bold py-3.5 rounded-xl shadow-lg uppercase hover:bg-stone-200 transition-all">SUBMIT REQUEST</button>
                </div>
            </div>
        </div>
        <div class="floating-chat-widget">
            <button id="chatToggleBtn" class="chat-toggle-btn">💬</button>
            <div id="chatWindow" class="chat-window hidden absolute bottom-16 right-0">
                <div class="bg-blue-900/60 p-3 text-white text-xs">✨ AI Assistant</div>
                <div id="widgetMsgZone" class="widget-msg-zone">
                    <div class="bg-stone-800 text-stone-200 text-xs p-3.5 rounded-xl">안녕하세요! 무엇을 도와드릴까요?</div>
                </div>
                <div class="p-3 bg-stone-900 flex gap-2">
                    <input type="text" id="widgetInput" class="flex-1 bg-stone-800 text-white text-xs px-2 rounded" placeholder="질문 입력...">
                    <button onclick="sendAiMessage()" class="bg-blue-600 text-white text-xs px-3 rounded">전송</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 👑 [수정] Base64 디코딩 방식 적용 (안정성 100%)
        const encodedData = "${GUIDELINE_TXT_URL}";
        const G_TXT = (encodedData === "error") ? "가이드라인 정보 없음" : atob(encodedData);
        const API_KEY = "OPENROUTER_API_KEY_HERE";

        function switchPage(pageId) {
            ['mainPage', 'promoPage', 'contactPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }
        document.getElementById('chatToggleBtn').addEventListener('click', () => document.getElementById('chatWindow').classList.toggle('hidden'));
        
        function appendMessage(sender, message) {
            const zone = document.getElementById('widgetMsgZone');
            zone.insertAdjacentHTML('beforeend', `<div class="${sender === 'user' ? 'text-right' : 'text-left'} mb-2 text-xs text-white">${message}</div>`);
            zone.scrollTop = zone.scrollHeight;
        }

        async function sendAiMessage() {
            const input = document.getElementById('widgetInput');
            const text = input.value.trim();
            if(!text) return;
            appendMessage('user', text);
            input.value = '';
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages: [
                            {"role": "system", "content": "너는 브랜드 지침을 참고하는 AI 비서야. 지침: " + G_TXT},
                            {"role": "user", "content": text}
                        ]
                    })
                });
                const data = await res.json();
                appendMessage('bot', data.choices[0].message.content);
            } catch(e) { appendMessage('bot', "오류가 발생했습니다."); }
        }
    </script>
</body>
</html>
